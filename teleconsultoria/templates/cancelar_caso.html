<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cancelar Solicitação</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --white: #fcfcfc;
            --ink-900: #333333;
            --p-color: #666;
            --input-border: #ccc;
            --shadow: rgba(0,0,0,0.05);
            --radio-bg: #fff;
            --radio-border: #888;
            --radio-selected: #d32f2f;
        }

        body.dark-mode {
            --bg: #071a14;
            --white: #0b241b;
            --ink-900: #f8fafc;
            --p-color: #a3b3c2;
            --input-border: #16352b;
            --shadow: rgba(11,61,46,0.4);
            --radio-bg: #113328;
            --radio-border: #2c5e4e;
            --radio-selected: #ef4444;
        }

        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.5; background-color: var(--bg); color: var(--ink-900); transition: background-color 0.3s ease, color 0.3s ease; position: relative; }
        .card { border: 1px solid var(--input-border); padding: 25px; border-radius: 8px; background-color: var(--white); box-shadow: 0 4px 10px var(--shadow); }
        h2 { color: #d32f2f; margin-top: 0; }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group > label {
            display: block;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        /* Estilização customizada para as opções em bolinhas (Radio Buttons) */
        .radio-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background-color: var(--white);
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .radio-option:hover {
            background-color: rgba(211, 47, 47, 0.05);
            border-color: #d32f2f;
        }

        .radio-option input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--radio-border);
            border-radius: 50%;
            background-color: var(--radio-bg);
            margin-right: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            flex-shrink: 0;
        }

        .radio-option input[type="radio"]:checked {
            border-color: var(--radio-selected);
            background-color: var(--radio-selected);
            box-shadow: inset 0 0 0 3px var(--white);
        }

        .radio-text {
            font-size: 0.95rem;
            user-select: none;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            box-sizing: border-box;
            background-color: var(--white);
            color: var(--ink-900);
            font-family: inherit;
            font-size: 0.95rem;
        }
        textarea:focus {
            outline: none;
            border-color: #d32f2f;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .hidden {
            display: none;
        }

        .btn-confirmar { background: #d32f2f; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-confirmar:hover { background: #b71c1c; }
        .btn-cancelar { background: #ccc; color: #333; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-size: 0.95rem; display: inline-block; margin-left: 10px; }
        
        .theme-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--input-border);
            color: var(--ink-900);
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙 Modo Escuro</button>

    <div class="card">
        <h2>Cancelar Solicitação</h2>
        <p style="color: var(--p-color);">Inicie o processo para desmarcar ou cancelar a reunião agendada para esse caso.</p>
        
        <form method="POST" action="{% url 'cancelar_solicitacao' sol.id %}" id="cancelForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Selecione a justificativa do cancelamento:</label>
                
                <div class="radio-container">
                    <label class="radio-option">
                        <input type="radio" name="justificativa" value="O profissional solicitante não pôde comparecer / desistiu da reunião" required onclick="verificarMotivo(this)">
                        <span class="radio-text">O profissional solicitante não pôde comparecer / desistiu da reunião</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="justificativa" value="imprevisto emergencial de horário" onclick="verificarMotivo(this)">
                        <span class="radio-text">Imprevisto emergencial de horário</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="justificativa" value="Problemas técnicos ou de instabilidade de internet" onclick="verificarMotivo(this)">
                        <span class="radio-text">Problemas técnicos na plataforma ou instabilidade de internet</span>
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="justificativa" value="OUTRO" onclick="verificarMotivo(this)">
                        <span class="radio-text">Outro</span>
                    </label>
                </div>
            </div>

            <div class="form-group hidden" id="campo_justificativa_livre">
                <label for="justificativa_texto">Escreva a justificativa:</label>
                <textarea id="justificativa_texto" name="justificativa_detalhada" placeholder="Descreva o motivo pelo qual a videoconferência não pôde ser acionada..."></textarea>
            </div>

            <div style="margin-top: 25px;">
                <button type="submit" class="btn-confirmar">Confirmar Cancelamento</button>
                <a href="{% url 'detalhe_caso' sol.id %}" class="btn-cancelar">Voltar sem cancelar</a>
            </div>
        </form>
    </div>

    <script>
        // Lógica para mostrar/esconder e validar dinamicamente a área de texto livre
        function verificarMotivo(radioElement) {
            const campoLivre = document.getElementById('campo_justificativa_livre');
            const txtArea = document.getElementById('justificativa_texto');
            
            if (radioElement.value === 'OUTRO') {
                campoLivre.classList.remove('hidden');
                txtArea.setAttribute('required', 'required');
                txtArea.focus();
            } else {
                campoLivre.classList.add('hidden');
                txtArea.removeAttribute('required');
                txtArea.value = ''; // Limpa se o usuário mudar de ideia
            }
        }

        // Carrega o tema salvo ao renderizar a página
        document.addEventListener("DOMContentLoaded", function() {
            const currentTheme = localStorage.getItem("theme");
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            
            if (currentTheme === "dark") {
                body.classList.add("dark-mode");
                btn.innerHTML = "☀️ Modo Claro";
            } else {
                body.classList.remove("dark-mode");
                btn.innerHTML = "🌙 Modo Escuro";
            }
        });

        // Alterna o tema e salva o estado no localStorage
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerHTML = "☀️ Modo Claro";
                localStorage.setItem("theme", "dark");
            } else {
                btn.innerHTML = "🌙 Modo Escuro";
                localStorage.setItem("theme", "light");
            }
        }
    </script>
</body>
</html>
