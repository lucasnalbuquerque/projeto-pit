<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cancelar Solicitação </title>
    <style>
        :root {
            --bg: #f4f7f6;
            --white: #fcfcfc;
            --ink-900: #333333;
            --p-color: #666;
            --input-border: #ccc;
            --shadow: rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg: #020617;
            --white: #0f172a;
            --ink-900: #f8fafc;
            --p-color: #94a3b8;
            --input-border: #334155;
            --shadow: rgba(0,0,0,0.5);
        }

        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.5; background-color: var(--bg); color: var(--ink-900); transition: background-color 0.3s ease, color 0.3s ease; position: relative; }
        .card { border: 1px solid var(--input-border); padding: 25px; border-radius: 8px; background-color: var(--white); box-shadow: 0 2px 5px var(--shadow); transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        h2 { color: #dc3545; margin-top: 0; }
        p { color: var(--p-color); font-size: 0.9em; transition: color 0.3s ease; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid var(--input-border); border-radius: 4px; resize: vertical; margin-top: 10px; box-sizing: border-box; background-color: var(--white); color: var(--ink-900); transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .btn-confirmar { background: #dc3545; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-cancelar { color: var(--p-color); text-decoration: none; margin-left: 15px; font-size: 0.9em; transition: color 0.3s ease; }
        .btn-confirmar:hover { background: #c82333; }
        
        .theme-toggle {
            position: absolute;
            top: -30px;
            right: 20px;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: inherit;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        body.dark-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @media (max-width: 640px) {
            .theme-toggle { top: -40px; right: 10px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo Escuro</button>

    <div class="card">
        <h2>Justificativa de Cancelamento</h2>
        <p>Você está prestes a cancelar a essa solicitação. Por favor, descreva o motivo abaixo (ex: erro no agendamento, solicitação duplicada, etc):</p>
        
        <form method="POST">
            {% csrf_token %}
            <textarea name="justificativa" placeholder="Digite aqui o motivo do cancelamento..." required></textarea>
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn-confirmar">Confirmar Cancelamento</button>
                <a href="{% url 'detalhe_caso' sol.id %}" class="btn-cancelar">Voltar sem cancelar</a>
            </div>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerHTML = "☀️ Modo Claro";
            } else {
                btn.innerHTML = "🌙 Modo Escuro";
            }
        }
    </script>
</body>
</html>
