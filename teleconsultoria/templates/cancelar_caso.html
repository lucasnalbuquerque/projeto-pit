<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cancelar Solicitação #{{ sol.id }}</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.5; background-color: #f4f7f6; }
        .card { border: 1px solid #ccc; padding: 25px; border-radius: 8px; background-color: #fcfcfc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h2 { color: #dc3545; margin-top: 0; }
        p { color: #666; font-size: 0.9em; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; margin-top: 10px; box-sizing: border-box; }
        .btn-confirmar { background: #dc3545; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-cancelar { color: #666; text-decoration: none; margin-left: 15px; font-size: 0.9em; }
        .btn-confirmar:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Justificativa de Cancelamento</h2>
        <p>Você está prestes a cancelar a <strong>Solicitação #{{ sol.id }}</strong>. Por favor, descreva o motivo abaixo (ex: erro no agendamento, solicitação duplicada, etc):</p>
        
        <form method="POST">
            {% csrf_token %}
            <textarea name="justificativa" placeholder="Digite aqui o motivo do cancelamento..." required></textarea>
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn-confirmar">Confirmar Cancelamento</button>
                <a href="{% url 'detalhe_caso' sol.id %}" class="btn-cancelar">Voltar sem cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
