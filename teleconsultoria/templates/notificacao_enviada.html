<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Enviado | Teleconsultoria HULW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hulw-green-900: #0b3d2e;
            --hulw-green-100: #137a4d;
            --hulw-green-50:  #f3faf6;
            --ink-900: #0f172a;
            --ink-700: #334155;
            --ink-500: #64748b;
            --line:    #e2e8f0;
            --bg:      #f8fafc;
            --white:   #ffffff;

            --whatsapp-green: #137a4d;
            --whatsapp-bg: #e8f9ee;
            --whatsapp-tx: #0b3d2e;

            --shadow-md: 0 4px 6px -1px rgba(11, 61, 46, 0.05), 0 2px 4px -2px rgba(11, 61, 46, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(11, 61, 46, 0.1), 0 8px 10px -6px rgba(11, 61, 46, 0.1);
            --radius: 16px;
        }


        body.dark-mode {
            --bg: #03140f;              
            --white: #08221a;           
            --ink-900: #f1f5f9;         
            --ink-700: #cbd5e1;         
            --ink-500: #94a3b8;         
            --line: #164e3f;            
            
            --hulw-green-900: #34d399;   
            --hulw-green-100: #10b981;   
            --hulw-green-50: #06241b;

            --whatsapp-bg: #0b2e1a;
            --whatsapp-tx: #34d399;
        }

        * { 
            box-sizing: border-box; 
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; 
        }
        
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink-900);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .card-notificacao {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: var(--whatsapp-bg);
            color: var(--hulw-green-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .icon-wrapper svg {
            width: 36px;
            height: 36px;
            fill: cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-notificacao h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--hulw-green-900);
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        .card-notificacao p {
            font-size: 0.98rem;
            color: var(--ink-700);
            margin: 0 0 24px 0;
        }

        .aviso-whatsapp {
            background: var(--whatsapp-bg);
            color: var(--whatsapp-tx);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 32px;
            border: 1px solid rgba(19, 122, 77, 0.15);
        }

        .btn-entendido {
            background: var(--hulw-green-100);
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: inline-block;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-entendido:hover {
            background: #199b63;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(19, 122, 77, 0.15);
        }

        .btn-entendido:active {
            transform: translateY(0);
        }

        body.dark-mode .btn-entendido {
            background: var(--hulw-green-100);
            color: #ffffff;
        }
        body.dark-mode .btn-entendido:hover {
            background: #15724f;
        }

        .footer-info {
            text-align: center;
            color: var(--ink-500);
            font-size: 0.78rem;
            margin-top: 24px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card-notificacao">
    <div class="icon-wrapper">
        <!-- Ícone atualizado para E-mail (Envelope) -->
        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
    </div>

    <h1>Tudo pronto!</h1>
    <p>Um novo link de acesso seguro e renovado foi gerado com sucesso.</p>

    <div class="aviso-whatsapp">
        Será enviado para seu email.
    </div>

    <button class="btn-entendido" onclick="window.close();">
        Entendido, fechar esta página
    </button>

    <div class="footer-info">
        Teleconsultoria HULW · Link válido por mais 10 dias.
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }
    });
</script>
</body>
</html>
