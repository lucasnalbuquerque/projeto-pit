<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Enviado | Teleconsultoria HULW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* PALETA PRINCIPAL (Modo Claro) */
            --hulw-green-900: #0b3d2e;
            --hulw-green-100: #137a4d;
            --hulw-green-50:  #f3faf6;
            --ink-900: #0f172a;
            --ink-700: #334155;
            --ink-500: #64748b;
            --line:    #e2e8f0;
            --bg:      #f8fafc;
            --white:   #ffffff;

            --whatsapp-green: #25d366;
            --whatsapp-bg: #e8f9ee;
            --whatsapp-tx: #075e54;

            --shadow-md: 0 4px 6px -1px rgba(11, 61, 46, 0.05), 0 2px 4px -2px rgba(11, 61, 46, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(11, 61, 46, 0.1), 0 8px 10px -6px rgba(11, 61, 46, 0.1);
            --radius: 16px;
        }

        /* PALETA DO MODO ESCURO INSTITUCIONAL */
        body.dark-mode {
            --bg: #03140f;              
            --white: #08221a;           
            --ink-900: #f1f5f9;         
            --ink-700: #cbd5e1;         
            --ink-500: #94a3b8;         
            --line: #164e3f;            
            
            --hulw-green-900: #34d399;   
            --hulw-green-100: #10b981;   
            --hulw-green-50: #06241b;

            --whatsapp-bg: #0b2e1a;
            --whatsapp-tx: #34d399;
        }

        * { 
            box-sizing: border-box; 
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; 
        }
        
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink-900);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .card-notificacao {
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        /* Ícone animado sutil do WhatsApp */
        .icon-wrapper {
            width: 72px;
            height: 72px;
            background: var(--whatsapp-bg);
            color: var(--whatsapp-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        .card-notificacao h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--hulw-green-900);
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        .card-notificacao p {
            font-size: 0.98rem;
            color: var(--ink-700);
            margin: 0 0 24px 0;
        }

        /* Alerta de instrução interno */
        .aviso-whatsapp {
            background: var(--whatsapp-bg);
            color: var(--whatsapp-tx);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 32px;
            border: 1px solid rgba(37, 211, 102, 0.15);
        }

        /* Botão estilizado para fechar ou voltar */
        .btn-entendido {
            background: var(--hulw-green-100);
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: inline-block;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-entendido:hover {
            background: #199b63;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(19, 122, 77, 0.15);
        }

        .btn-entendido:active {
            transform: translateY(0);
        }

        body.dark-mode .btn-entendido {
            background: var(--hulw-green-100);
            color: #ffffff;
        }
        body.dark-mode .btn-entendido:hover {
            background: #15724f;
        }

        .footer-info {
            text-align: center;
            color: var(--ink-500);
            font-size: 0.78rem;
            margin-top: 24px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card-notificacao">
    <div class="icon-wrapper">
        <svg viewBox="0 0 24 24">
            <path d="M12.004 2C6.48 2 2 6.48 2 12.004c0 1.848.502 3.578 1.378 5.067L2 22l5.097-1.337A9.932 9.932 0 0 0 12.004 22c5.523 0 10-4.477 10-10S17.527 2 12.004 2zm5.722 13.06c-.244.686-1.22 1.253-1.684 1.314-.464.06-1.047.092-2.923-.647-2.39-.942-3.916-3.37-4.037-3.53-.12-.163-.996-1.32-.996-2.52 0-1.2.624-1.792.846-2.034.22-.243.483-.304.644-.304.162 0 .324.002.464.008.146.006.342-.056.536.408.2.48.684 1.666.744 1.788.06.12.102.262.02.426-.08.163-.122.264-.244.407-.12.14-.254.314-.364.422-.12.12-.245.252-.104.494.14.24.624 1.03 1.338 1.664.92.818 1.696 1.07 1.94 1.19.24.12.383.1.523-.06.14-.162.604-.703.766-.943.16-.242.322-.202.544-.12.22.08 1.4.66 1.64.78.24.12.4.18.46.284.06.106.06.61-.184 1.297z"/>
        </svg>
    </div>

    <h1>Tudo pronto!</h1>
    <p>Um novo link de acesso seguro e renovado foi gerado e enviado para o seu WhatsApp cadastrado.</p>

    <div class="aviso-whatsapp">
        Verifique suas mensagens no whatsapp para acessar o painel.
    </div>

    <!-- botão ainda sem regra de negócio (ex: fechar aba, voltar pro início, etc) -->
    <button class="btn-entendido" onclick="window.close();">
        Entendido, fechar esta página
    </button>

    <div class="footer-info">
        Teleconsultoria HULW · Link válido por mais 24 horas.
    </div>
</div>

<script>
    // Sincroniza o tema escuro automaticamente com a escolha salva no painel principal
    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }
    });
</script>
</body>
</html>
