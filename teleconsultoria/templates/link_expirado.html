<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Expirado</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #333;
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            max-width: 450px;
        }
        .icon { 
            font-size: 60px; 
            color: #dc3545; 
            margin-bottom: 20px; 
        }
        h1 { 
            font-size: 24px; 
            margin-bottom: 10px; 
            color: #212529;
        }
        p { 
            font-size: 16px; 
            color: #6c757d; 
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-renovar {
            display: inline-block;
            text-decoration: none;
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-renovar:hover {
            background-color: #218838;
        }
        .footer-obs {
            margin-top: 30px;
            font-size: 0.85em;
            color: #adb5bd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Link de Acesso Expirado</h1>
        <p>Por razões de segurança, este link de acompanhamento expirou e não é mais válido.</p>
        
        <p>Clique no botão abaixo para gerar um <strong>novo link de acesso</strong>. Ele será enviado imediatamente para o seu e-mail cadastrado.</p>

        <form action="{% url 'renovar_acesso' link_obj.token %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-renovar">
                📧 Enviar novo link para meu e-mail
            </button>
        </form>

        <div class="footer-obs">
            Código de Erro: 403 - Forbidden Access
        </div>
    </div>

</body>
</html>
