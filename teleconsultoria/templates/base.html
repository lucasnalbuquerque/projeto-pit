<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HULW Teleconsultoria{% endblock %}</title>
    
    <style>
        /* Paleta de cores extraída rigorosamente do seu código */
        :root {
            --hulw-green: #137a4d;
            --hulw-green-dark: #0e5a39;
            --hulw-green-light: #e8f5ee;
            --hulw-green-soft: #f3faf6;
            --hulw-accent: #1b9e63;
            --ink: #1f2a25;
            --ink-soft: #4b5a52;
            --muted: #7a8a82;
            --line: #dde7e1;
            --bg: #f5f8f6;
            --white: #ffffff;
            --warning-bg: #fff8e1;
            --warning-border: #f1d27a;
            --warning-text: #7a5a10;
            --danger: #c0392b;
            --teams: #4a52b8;
            --teams-dark: #353c93;
            --radius: 10px;
            --shadow: 0 1px 2px rgba(16, 60, 40, 0.04), 0 4px 16px rgba(16, 60, 40, 0.06);
        }

        body.dark-mode {
            --bg: #121614;
            --white: #1a201c;
            --ink: #e1e7e4;
            --ink-soft: #b0beb6;
            --muted: #718278;
            --line: #2d3832;
            --hulw-green-dark: #2ecc71;
            --hulw-green-soft: #1e2622;
            --warning-bg: #2d2613;
            --warning-border: #5e4d1d;
            --warning-text: #f1c40f;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Ajustes específicos do bloco síncrono no modo escuro */
        body.dark-mode .sincrona-block {
            background: linear-gradient(180deg, #1e2238 0%, #171a2b 100%);
        }
        body.dark-mode .sincrona-block .teams-white-card {
            background: #1a201c !important;
            border-color: #2d3832 !important;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>

    {% block content %}
    {% endblock %}

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (!btn) return;
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                btn.innerHTML = "☀️ Modo Claro";
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerHTML = "🌙 Modo Escuro";
                localStorage.setItem('theme', 'light');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const btn = document.getElementById('themeBtn');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if (btn) btn.innerHTML = "☀️ Modo Claro";
            }
        });
    </script>
</body>
</html>
